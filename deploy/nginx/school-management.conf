# Nginx reverse proxy for School Management System
# Install: sudo cp deploy/nginx/school-management.conf /etc/nginx/sites-available/school-management
#          sudo ln -s /etc/nginx/sites-available/school-management /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream school_management_app {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 8;
}

# Rate limit login attempts
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP to HTTPS (enable after certbot)
    # return 301 https://$host$request_uri;

    client_max_body_size 16M;

    access_log /var/log/nginx/school-management.access.log;
    error_log  /var/log/nginx/school-management.error.log;

    # Static files — served directly by Nginx (faster than Flask)
    location /static/ {
        alias /var/www/school-management/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://school_management_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    location /login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://school_management_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

